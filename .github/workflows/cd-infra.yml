# Infrastructure CD Pipeline (GitOps)
# Manages network (Terraform) and GKE Standard cluster + ArgoCD + External Secrets bootstrap.
#
# Actions:
#   - status:          Check infrastructure status
#   - network-apply:   Create/update VPC and subnets (Terraform)
#   - gke-setup:       Create GKE Standard cluster, install ArgoCD + ESO,
#                      seed GCP Secret Manager, apply ArgoCD Application
#                      (Helm chart at k8s/charts/parkgolf is then auto-synced)
#   - gke-update:      Re-seed GCP Secret Manager (rotate keys) and
#                      trigger ESO refresh + ArgoCD hard-refresh
#   - gke-destroy:     Delete GKE cluster (preserves Artifact Registry, VPC, GCP Secret Manager)
#   - network-destroy: Delete VPC and subnets (Terraform)

name: CD Infrastructure

concurrency:
  group: cd-infra-${{ github.event.inputs.environment }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: 'dev'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - status
          - network-apply
          - gke-setup
          - gke-update
          - gke-destroy
          - network-destroy
      confirm:
        description: 'Type "destroy" to confirm destruction'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: '1.6.0'
  REGION: asia-northeast3
  PROJECT_ID: parkgolf-uniyous

jobs:
  # ============================================================================
  # Setup
  # ============================================================================
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      cluster_name: ${{ steps.env.outputs.cluster_name }}
      namespace: ${{ steps.env.outputs.namespace }}
      tf_dir: ${{ steps.env.outputs.tf_dir }}
      # 환경별 클러스터 사양 (dev: zonal 단일 / prod: regional HA)
      location_flag: ${{ steps.env.outputs.location_flag }}    # --zone or --region
      location_value: ${{ steps.env.outputs.location_value }}  # asia-northeast3-a or asia-northeast3
      machine_type: ${{ steps.env.outputs.machine_type }}
      num_nodes: ${{ steps.env.outputs.num_nodes }}
      min_nodes: ${{ steps.env.outputs.min_nodes }}
      max_nodes: ${{ steps.env.outputs.max_nodes }}
      disk_size: ${{ steps.env.outputs.disk_size }}
      disk_type: ${{ steps.env.outputs.disk_type }}
      argocd_app: ${{ steps.env.outputs.argocd_app }}
    steps:
      - name: Determine environment settings
        id: env
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "cluster_name=parkgolf-${ENV}-cluster" >> $GITHUB_OUTPUT
          echo "namespace=parkgolf-${ENV}" >> $GITHUB_OUTPUT
          echo "tf_dir=infra/environments/${ENV}" >> $GITHUB_OUTPUT
          echo "argocd_app=k8s/argocd/application-${ENV}.yaml" >> $GITHUB_OUTPUT

          if [ "$ENV" = "prod" ]; then
            # prod: regional 3-zone HA
            echo "location_flag=--region" >> $GITHUB_OUTPUT
            echo "location_value=asia-northeast3" >> $GITHUB_OUTPUT
            echo "machine_type=e2-standard-4" >> $GITHUB_OUTPUT
            echo "num_nodes=1" >> $GITHUB_OUTPUT     # per zone (regional 3 zone = 3 nodes)
            echo "min_nodes=1" >> $GITHUB_OUTPUT
            echo "max_nodes=2" >> $GITHUB_OUTPUT     # per zone (max 6 nodes total)
            echo "disk_size=100" >> $GITHUB_OUTPUT
            echo "disk_type=pd-ssd" >> $GITHUB_OUTPUT
          else
            # dev: zonal 단일
            echo "location_flag=--zone" >> $GITHUB_OUTPUT
            echo "location_value=asia-northeast3-a" >> $GITHUB_OUTPUT
            echo "machine_type=e2-standard-2" >> $GITHUB_OUTPUT
            echo "num_nodes=1" >> $GITHUB_OUTPUT
            echo "min_nodes=1" >> $GITHUB_OUTPUT
            echo "max_nodes=3" >> $GITHUB_OUTPUT
            echo "disk_size=50" >> $GITHUB_OUTPUT
            echo "disk_type=pd-standard" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Status Check
  # ============================================================================
  status:
    name: Infrastructure Status
    needs: setup
    if: github.event.inputs.action == 'status'
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Check VPC Status
        run: |
          echo "=== VPC Networks ==="
          gcloud compute networks list --filter="name~parkgolf" --format="table(name,autoCreateSubnetworks,routingConfig.routingMode)"
          echo ""
          echo "=== Subnets ==="
          gcloud compute networks subnets list --filter="network~parkgolf" --format="table(name,region,ipCidrRange)"

      - name: Check GKE Status
        run: |
          CLUSTER="${{ needs.setup.outputs.cluster_name }}"
          echo "=== GKE Cluster ==="
          if gcloud container clusters describe $CLUSTER ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }} 2>/dev/null; then
            echo "Cluster exists"

            # Get credentials and show resources
            gcloud container clusters get-credentials $CLUSTER ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }}

            echo ""
            echo "=== Nodes ==="
            kubectl get nodes

            echo ""
            echo "=== Pods in ${{ needs.setup.outputs.namespace }} ==="
            kubectl get pods -n ${{ needs.setup.outputs.namespace }} -o wide

            echo ""
            echo "=== Services ==="
            kubectl get svc -n ${{ needs.setup.outputs.namespace }}

            echo ""
            echo "=== Ingress ==="
            kubectl get ingress -n ${{ needs.setup.outputs.namespace }}

            echo ""
            echo "=== PVC ==="
            kubectl get pvc -n ${{ needs.setup.outputs.namespace }}
          else
            echo "Cluster does not exist"
          fi

      - name: Summary
        run: |
          echo "## Infrastructure Status - ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check VPC
          if gcloud compute networks describe parkgolf-${{ needs.setup.outputs.environment }} 2>/dev/null; then
            echo "| VPC | Active |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| VPC | Not Found |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check GKE
          if gcloud container clusters describe ${{ needs.setup.outputs.cluster_name }} ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }} 2>/dev/null; then
            echo "| GKE Cluster | Running |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GKE Cluster | Not Found |" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Network - Terraform Apply
  # ============================================================================
  network-apply:
    name: Network Apply (Terraform)
    needs: setup
    if: github.event.inputs.action == 'network-apply'
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ needs.setup.outputs.tf_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: |
          # Check if backend bucket exists, create if not
          BUCKET="parkgolf-uniyous-terraform-state"
          if ! gcloud storage buckets describe gs://$BUCKET 2>/dev/null; then
            echo "Creating Terraform state bucket..."
            gcloud storage buckets create gs://$BUCKET --location=${{ env.REGION }}
          fi
          terraform init

      - name: Create tfvars
        run: |
          cat > terraform.tfvars << EOF
          db_password        = "${{ secrets.DB_PASSWORD }}"
          jwt_secret         = "${{ secrets.JWT_SECRET }}"
          jwt_refresh_secret = "${{ secrets.JWT_REFRESH_SECRET }}"
          EOF

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ needs.setup.outputs.environment }}" \
            -target=module.networking \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Summary
        run: |
          echo "## Network Infrastructure Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- VPC: parkgolf-${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # GKE Setup
  # ============================================================================
  gke-setup:
    name: GKE Setup
    needs: setup
    if: github.event.inputs.action == 'gke-setup'
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Validate Secrets
        run: |
          MISSING=()
          for KEY in DB_PASSWORD JWT_SECRET JWT_REFRESH_SECRET TOSS_SECRET_KEY TOSS_SECURITY_KEY KMA_API_KEY KAKAO_API_KEY DEEPSEEK_API_KEY PARTNER_ENCRYPTION_KEY; do
            VAL=$(jq -r --arg k "$KEY" '.[$k] // ""' <<< '${{ toJSON(secrets) }}')
            [ -z "$VAL" ] && MISSING+=("$KEY")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Enable GCP APIs
        run: |
          gcloud services enable container.googleapis.com
          gcloud services enable artifactregistry.googleapis.com
          gcloud services enable compute.googleapis.com

      - name: Create Artifact Registry
        run: |
          if gcloud artifacts repositories describe parkgolf --location=${{ env.REGION }} 2>/dev/null; then
            echo "Artifact Registry already exists"
          else
            echo "Creating Artifact Registry..."
            gcloud artifacts repositories create parkgolf \
              --repository-format=docker \
              --location=${{ env.REGION }} \
              --description="Parkgolf container images"
          fi

      - name: Check/Create GKE Standard Cluster
        run: |
          CLUSTER="${{ needs.setup.outputs.cluster_name }}"
          ENV="${{ needs.setup.outputs.environment }}"
          LOC_FLAG="${{ needs.setup.outputs.location_flag }}"
          LOC_VAL="${{ needs.setup.outputs.location_value }}"

          if gcloud container clusters describe $CLUSTER $LOC_FLAG=$LOC_VAL 2>/dev/null; then
            echo "Cluster already exists — ensuring logging/monitoring config"
            # workload 로그 수집 활성 (멱등, 변경 없으면 즉시 종료)
            gcloud container clusters update $CLUSTER $LOC_FLAG=$LOC_VAL \
              --logging=SYSTEM,WORKLOAD \
              --monitoring=SYSTEM \
              || echo "(no-op or already configured)"
          else
            echo "Creating GKE Standard cluster ($ENV, $LOC_FLAG=$LOC_VAL)..."
            gcloud container clusters create $CLUSTER \
              $LOC_FLAG=$LOC_VAL \
              --machine-type=${{ needs.setup.outputs.machine_type }} \
              --num-nodes=${{ needs.setup.outputs.num_nodes }} \
              --enable-autoscaling \
              --min-nodes=${{ needs.setup.outputs.min_nodes }} \
              --max-nodes=${{ needs.setup.outputs.max_nodes }} \
              --disk-size=${{ needs.setup.outputs.disk_size }} \
              --disk-type=${{ needs.setup.outputs.disk_type }} \
              --network=parkgolf-${ENV} \
              --subnetwork=parkgolf-private-${ENV} \
              --release-channel=regular \
              --workload-pool=${{ env.PROJECT_ID }}.svc.id.goog \
              --enable-ip-alias \
              --logging=SYSTEM,WORKLOAD \
              --monitoring=SYSTEM
          fi

      - name: Wait for Cluster Ready
        run: |
          CLUSTER="${{ needs.setup.outputs.cluster_name }}"
          LOC_FLAG="${{ needs.setup.outputs.location_flag }}"
          LOC_VAL="${{ needs.setup.outputs.location_value }}"
          for i in {1..40}; do
            STATUS=$(gcloud container clusters describe $CLUSTER \
              $LOC_FLAG=$LOC_VAL \
              --format="value(status)" 2>/dev/null || echo "PROVISIONING")
            echo "[$i/40] Cluster status: $STATUS"
            [ "$STATUS" = "RUNNING" ] && { echo "Cluster is ready!"; break; }
            sleep 30
          done

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials ${{ needs.setup.outputs.cluster_name }} \
            ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }}

      - name: Create Namespace
        run: |
          kubectl create namespace ${{ needs.setup.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: ESO Workload Identity Service Account
        run: |
          PROJECT_ID=$(gcloud config get-value project)
          SA_EMAIL="parkgolf-eso@${PROJECT_ID}.iam.gserviceaccount.com"

          # SA 존재 확인 후 생성
          if ! gcloud iam service-accounts describe $SA_EMAIL 2>/dev/null; then
            gcloud iam service-accounts create parkgolf-eso \
              --display-name="External Secrets Operator"
            sleep 15  # SA 전파 대기
          fi

          # Secret Manager 접근 권한
          gcloud projects add-iam-policy-binding $PROJECT_ID \
            --member="serviceAccount:$SA_EMAIL" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None

          # Workload Identity 바인딩 (KSA external-secrets/external-secrets → GCP SA)
          gcloud iam service-accounts add-iam-policy-binding $SA_EMAIL \
            --role="roles/iam.workloadIdentityUser" \
            --member="serviceAccount:${PROJECT_ID}.svc.id.goog[external-secrets/external-secrets]"

      - name: Enable Secret Manager API
        run: |
          gcloud services enable secretmanager.googleapis.com

      - name: Seed GCP Secret Manager
        run: |
          ENV=${{ needs.setup.outputs.environment }}

          # GitHub Secrets → GCP Secret Manager (있으면 새 버전 추가, 없으면 생성)
          declare -A SECRETS=(
            [POSTGRES_USER]="parkgolf"
            [POSTGRES_PASSWORD]="${{ secrets.DB_PASSWORD }}"
            [JWT_SECRET]="${{ secrets.JWT_SECRET }}"
            [JWT_REFRESH_SECRET]="${{ secrets.JWT_REFRESH_SECRET }}"
            [TOSS_SECRET_KEY]="${{ secrets.TOSS_SECRET_KEY }}"
            [TOSS_SECURITY_KEY]="${{ secrets.TOSS_SECURITY_KEY }}"
            [KMA_API_KEY]="${{ secrets.KMA_API_KEY }}"
            [KAKAO_API_KEY]="${{ secrets.KAKAO_API_KEY }}"
            [DEEPSEEK_API_KEY]="${{ secrets.DEEPSEEK_API_KEY }}"
            [PARTNER_ENCRYPTION_KEY]="${{ secrets.PARTNER_ENCRYPTION_KEY }}"
          )

          for KEY in "${!SECRETS[@]}"; do
            VALUE="${SECRETS[$KEY]}"
            SECRET_NAME="parkgolf-${ENV}-${KEY}"
            if [ -z "$VALUE" ]; then
              echo "::warning::$KEY is empty, skipping"
              continue
            fi
            if gcloud secrets describe $SECRET_NAME 2>/dev/null > /dev/null; then
              printf "%s" "$VALUE" | gcloud secrets versions add $SECRET_NAME --data-file=-
              echo "Updated: $SECRET_NAME"
            else
              printf "%s" "$VALUE" | gcloud secrets create $SECRET_NAME --data-file=-
              echo "Created: $SECRET_NAME"
            fi
          done

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          # CRD 어노테이션 사이즈 한계 회피 — server-side apply 강제
          kubectl apply -n argocd \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml \
            --server-side --force-conflicts

      - name: Install External Secrets Operator
        run: |
          kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -

          # Helm 설치 (ubuntu runner에 기본 포함)
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          helm upgrade --install external-secrets external-secrets/external-secrets \
            -n external-secrets \
            --set installCRDs=true \
            --wait --timeout=5m

          # KSA Workload Identity annotation
          PROJECT_ID=$(gcloud config get-value project)
          kubectl annotate serviceaccount external-secrets \
            -n external-secrets \
            iam.gke.io/gcp-service-account=parkgolf-eso@${PROJECT_ID}.iam.gserviceaccount.com \
            --overwrite

      - name: Create Global Static IP for Ingress
        run: |
          # Helm chart의 ingress.staticIpName과 일치해야 함
          IP_NAME="parkgolf-${{ needs.setup.outputs.cluster_name }}-ip"
          if gcloud compute addresses describe $IP_NAME --global 2>/dev/null; then
            echo "Static IP already exists: $IP_NAME"
          else
            gcloud compute addresses create $IP_NAME --global
            echo "Created: $IP_NAME"
          fi
          IP=$(gcloud compute addresses describe $IP_NAME --global --format="value(address)")
          echo "Reserved IP: $IP"
          echo "::notice::Configure DNS A record for ${{ needs.setup.outputs.environment == 'prod' && 'api' || 'dev-api' }}.parkgolfmate.com → $IP"

      - name: Apply ArgoCD Application
        run: |
          # ArgoCD application server가 ready될 때까지 대기
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=5m
          kubectl apply -f ${{ needs.setup.outputs.argocd_app }}

      - name: Summary
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          IP_NAME="parkgolf-${{ needs.setup.outputs.cluster_name }}-ip"
          IP=$(gcloud compute addresses describe $IP_NAME --global --format="value(address)" 2>/dev/null || echo "N/A")
          DOMAIN=$([ "$ENV" = "prod" ] && echo "api.parkgolfmate.com" || echo "dev-api.parkgolfmate.com")

          echo "=========================================="
          echo "  GKE + ArgoCD Bootstrap Complete ($ENV)  "
          echo "=========================================="
          echo "Cluster:    ${{ needs.setup.outputs.cluster_name }}"
          echo "Namespace:  ${{ needs.setup.outputs.namespace }}"
          echo "Static IP:  $IP_NAME ($IP)"
          echo "Domain:     $DOMAIN"
          echo ""
          echo "=== argocd / external-secrets / parkgolf-${ENV} ==="
          kubectl get pods -n argocd 2>/dev/null | head -20 || true
          echo "---"
          kubectl get pods -n external-secrets 2>/dev/null | head -10 || true
          echo "---"
          kubectl get application parkgolf-${ENV} -n argocd 2>/dev/null || true
          echo ""
          echo "=== Next steps ==="
          echo "1. DNS A record:   $DOMAIN  →  $IP"
          echo "2. ArgoCD UI:      kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "   admin pw:       kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
          echo "3. CD Services:    image build + tag commit"
          echo "4. ArgoCD auto-sync (≤5분, prod는 수동 SYNC 필요)"
          echo "=========================================="

  # ============================================================================
  # GKE Update (Secrets/ConfigMap)
  # ============================================================================
  gke-update:
    name: GKE Update (rotate secrets + ArgoCD refresh)
    needs: setup
    if: github.event.inputs.action == 'gke-update'
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Re-seed GCP Secret Manager
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          declare -A SECRETS=(
            [POSTGRES_USER]="parkgolf"
            [POSTGRES_PASSWORD]="${{ secrets.DB_PASSWORD }}"
            [JWT_SECRET]="${{ secrets.JWT_SECRET }}"
            [JWT_REFRESH_SECRET]="${{ secrets.JWT_REFRESH_SECRET }}"
            [TOSS_SECRET_KEY]="${{ secrets.TOSS_SECRET_KEY }}"
            [TOSS_SECURITY_KEY]="${{ secrets.TOSS_SECURITY_KEY }}"
            [KMA_API_KEY]="${{ secrets.KMA_API_KEY }}"
            [KAKAO_API_KEY]="${{ secrets.KAKAO_API_KEY }}"
            [DEEPSEEK_API_KEY]="${{ secrets.DEEPSEEK_API_KEY }}"
            [PARTNER_ENCRYPTION_KEY]="${{ secrets.PARTNER_ENCRYPTION_KEY }}"
          )

          for KEY in "${!SECRETS[@]}"; do
            VALUE="${SECRETS[$KEY]}"
            SECRET_NAME="parkgolf-${ENV}-${KEY}"
            [ -z "$VALUE" ] && { echo "::warning::$KEY empty, skip"; continue; }

            if gcloud secrets describe $SECRET_NAME 2>/dev/null > /dev/null; then
              printf "%s" "$VALUE" | gcloud secrets versions add $SECRET_NAME --data-file=-
              echo "Updated: $SECRET_NAME"
            else
              printf "%s" "$VALUE" | gcloud secrets create $SECRET_NAME --data-file=-
              echo "Created: $SECRET_NAME"
            fi
          done

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials ${{ needs.setup.outputs.cluster_name }} \
            ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }}

      - name: Trigger ESO refresh
        run: |
          # ExternalSecret refreshInterval은 1h. 즉시 재동기화하려면 controller 재시작.
          kubectl rollout restart deployment/external-secrets -n external-secrets
          kubectl rollout status deployment/external-secrets -n external-secrets --timeout=2m

      - name: Trigger ArgoCD hard-refresh
        run: |
          # 새 Secret이 K8s에 동기화되면 envFrom secretKeyRef로 노출.
          # ArgoCD가 변경을 감지해 자동 sync. 즉시 sync 원하면 hard-refresh.
          kubectl annotate application parkgolf -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true

  # ============================================================================
  # GKE Destroy
  # ============================================================================
  gke-destroy:
    name: GKE Destroy
    needs: setup
    if: github.event.inputs.action == 'gke-destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm field to proceed"
            exit 1
          fi

      - name: Block Production
        if: needs.setup.outputs.environment == 'prod'
        run: |
          echo "::error::Production destruction requires manual approval"
          echo "Please delete via GCP Console or gcloud CLI"
          exit 1

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Delete GKE Cluster
        run: |
          CLUSTER="${{ needs.setup.outputs.cluster_name }}"
          if gcloud container clusters describe $CLUSTER ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }} 2>/dev/null; then
            echo "Deleting GKE cluster: $CLUSTER"
            gcloud container clusters delete $CLUSTER \
              ${{ needs.setup.outputs.location_flag }}=${{ needs.setup.outputs.location_value }} \
              --quiet
            echo "Cluster deleted"
          else
            echo "Cluster not found"
          fi

      - name: Delete Static IP
        run: |
          IP_NAME="parkgolf-${{ needs.setup.outputs.cluster_name }}-ip"
          if gcloud compute addresses describe $IP_NAME --global 2>/dev/null; then
            echo "Deleting static IP: $IP_NAME"
            gcloud compute addresses delete $IP_NAME --global --quiet
          else
            echo "Static IP not found"
          fi

      - name: Delete Orphaned PVC Disks
        run: |
          # dev: zonal asia-northeast3-a / prod: regional 3-zone
          ENV=${{ needs.setup.outputs.environment }}
          if [ "$ENV" = "prod" ]; then
            ZONES="asia-northeast3-a asia-northeast3-b asia-northeast3-c"
          else
            ZONES="asia-northeast3-a"
          fi

          DELETED=0
          for ZONE in $ZONES; do
            DISKS=$(gcloud compute disks list \
              --filter="name~^pvc- AND zone:$ZONE" \
              --format="value(name)" 2>/dev/null || true)
            for DISK in $DISKS; do
              echo "Deleting orphaned disk: $DISK in $ZONE"
              gcloud compute disks delete $DISK --zone=$ZONE --quiet || true
              DELETED=$((DELETED + 1))
            done
          done
          echo "Deleted $DELETED orphaned disk(s)"

      - name: Summary
        run: |
          echo "## GKE Cluster Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Cluster: ${{ needs.setup.outputs.cluster_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Preserved: Artifact Registry, VPC" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Network Destroy (Terraform)
  # ============================================================================
  network-destroy:
    name: Network Destroy (Terraform)
    needs: setup
    if: github.event.inputs.action == 'network-destroy'
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ needs.setup.outputs.tf_dir }}
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm field to proceed"
            exit 1
          fi

      - name: Block Production
        if: needs.setup.outputs.environment == 'prod'
        run: |
          echo "::error::Production network destruction is blocked"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: terraform init

      - name: Create tfvars
        run: |
          cat > terraform.tfvars << EOF
          db_password        = "${{ secrets.DB_PASSWORD }}"
          jwt_secret         = "${{ secrets.JWT_SECRET }}"
          jwt_refresh_secret = "${{ secrets.JWT_REFRESH_SECRET }}"
          EOF

      - name: Terraform Destroy Network
        run: |
          terraform destroy \
            -var="environment=${{ needs.setup.outputs.environment }}" \
            -target=module.networking \
            -auto-approve

      - name: Summary
        run: |
          echo "## Network Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
