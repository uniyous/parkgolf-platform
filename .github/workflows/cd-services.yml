# Backend Services CD Pipeline (GitOps via ArgoCD)
#
# 빌드 → Artifact Registry push → k8s/charts/parkgolf/values.yaml 의 image tag 갱신 → git commit
# ArgoCD가 변경 감지 후 자동 sync (5분 이내).
#
# Prerequisites:
#   1. GKE Standard 클러스터 + ArgoCD + External Secrets 설치 완료
#   2. GCP Secret Manager에 parkgolf-dev-* 시크릿 등록
#   3. GitHub Secret: GCP_SA_KEY

name: CD Services

permissions:
  contents: write

concurrency:
  group: cd-services-${{ github.event.inputs.environment }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]
        default: 'dev'
      services:
        description: 'Services to build (comma-separated or "all")'
        required: true
        default: 'all'
        type: string

env:
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev
  PROJECT_ID: parkgolf-uniyous

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      matrix: ${{ steps.services.outputs.matrix }}
    steps:
      - name: Set Environment
        id: env
        run: echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT

      - name: Set Services
        id: services
        run: |
          INPUT="${{ github.event.inputs.services }}"
          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            SERVICES="iam-service,course-service,booking-service,payment-service,chat-service,notify-service,saga-service,partner-service,admin-api,user-api,chat-gateway,weather-service,location-service,job-service,agent-service"
          else
            SERVICES="$INPUT"
          fi
          MATRIX=$(echo $SERVICES | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R . | jq -s -c .)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Check Service Directory
        id: check
        run: |
          if [ -d "services/${{ matrix.service }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Service directory not found: services/${{ matrix.service }}"
          fi

      - name: Build & Push
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          ENV=${{ needs.setup.outputs.environment }}

          IMAGE_NAME="$SERVICE"
          CONTEXT="services/$SERVICE"

          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/parkgolf/$IMAGE_NAME
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:${ENV}-latest \
            -f services/$SERVICE/Dockerfile "$CONTEXT"
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:${ENV}-latest

  update-manifest:
    name: Update Helm values & commit
    needs: [setup, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in env values
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          VALUES_FILE="k8s/charts/parkgolf/values-${ENV}.yaml"
          NEW_TAG=${{ github.sha }}
          SERVICES_JSON='${{ needs.setup.outputs.matrix }}'
          INPUT_SERVICES="${{ github.event.inputs.services }}"

          # serviceImageTags 노드 보장 (없거나 null이면 빈 객체로 초기화)
          CURRENT=$(yq '.serviceImageTags' "$VALUES_FILE")
          if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
            yq -i '.serviceImageTags = {}' "$VALUES_FILE"
          fi

          # 빌드된 service의 tag만 갱신 (다른 service는 기존 tag 또는 global.image.tag fallback)
          for svc in $(echo "$SERVICES_JSON" | jq -r '.[]'); do
            yq -i ".serviceImageTags.\"$svc\" = \"${NEW_TAG}\"" "$VALUES_FILE"
            echo "Updated: serviceImageTags.$svc = $NEW_TAG"
          done

          # services: all (또는 입력 비어있음=all로 처리)일 때만 global.image.tag fallback도 갱신
          if [ "$INPUT_SERVICES" = "all" ] || [ -z "$INPUT_SERVICES" ]; then
            yq -i ".global.image.tag = \"${NEW_TAG}\"" "$VALUES_FILE"
            echo "Updated: global.image.tag = $NEW_TAG (services=all)"
          else
            echo "Skipped global.image.tag update (services=$INPUT_SERVICES, not all)"
          fi

          echo "---After update ($VALUES_FILE)---"
          yq '.global.image.tag, .serviceImageTags' "$VALUES_FILE"
          echo "VALUES_FILE=$VALUES_FILE" >> $GITHUB_ENV

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_FILE"
          if git diff --cached --quiet; then
            echo "No changes — skip commit"
          else
            git commit -m "chore(cd-${{ needs.setup.outputs.environment }}): bump image tag to ${{ github.sha }} [skip ci]"
            git push
          fi

  summary:
    name: Summary
    needs: [setup, build-and-push, update-manifest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          SHA=${{ github.sha }}
          {
            echo "## CD Services — $ENV"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image tag | \`$SHA\` |"
            echo "| Tags pushed | \`$SHA\`, \`${ENV}-latest\` |"
            echo "| Helm values updated | \`k8s/charts/parkgolf/values-${ENV}.yaml\` |"
            echo "| Build result | ${{ needs.build-and-push.result }} |"
            echo "| Manifest commit result | ${{ needs.update-manifest.result }} |"
            echo ""
            echo "ArgoCD auto-sync (≤5분). 진행 확인:"
            echo "\`\`\`"
            echo "kubectl -n argocd get application parkgolf-${ENV}"
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY
