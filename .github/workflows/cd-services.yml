# Backend Services CD Pipeline (GitOps via ArgoCD)
#
# 빌드 → Artifact Registry push → k8s/charts/parkgolf/values.yaml 의 image tag 갱신 → git commit
# ArgoCD가 변경 감지 후 자동 sync (5분 이내).
#
# Prerequisites:
#   1. GKE Standard 클러스터 + ArgoCD + External Secrets 설치 완료
#   2. GCP Secret Manager에 parkgolf-dev-* 시크릿 등록
#   3. GitHub Secret: GCP_SA_KEY

name: CD Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]
        default: 'dev'
      services:
        description: 'Services to build (comma-separated or "all")'
        required: true
        default: 'all'
        type: string

env:
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      matrix: ${{ steps.services.outputs.matrix }}
    steps:
      - name: Set Environment
        id: env
        run: echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT

      - name: Set Services
        id: services
        run: |
          INPUT="${{ github.event.inputs.services }}"
          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            SERVICES="iam-service,course-service,booking-service,payment-service,chat-service,notify-service,saga-service,partner-service,admin-api,user-api,chat-gateway,weather-service,location-service,job-service,agent-service"
          else
            SERVICES="$INPUT"
          fi
          MATRIX=$(echo $SERVICES | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R . | jq -s -c .)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Extract Project ID
        run: |
          PROJECT_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | jq -r '.project_id')
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Check Service Directory
        id: check
        run: |
          if [ -d "services/${{ matrix.service }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Service directory not found: services/${{ matrix.service }}"
          fi

      - name: Build & Push
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/parkgolf/$SERVICE
          ENV=${{ needs.setup.outputs.environment }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:${ENV}-latest \
            -f services/$SERVICE/Dockerfile services/$SERVICE
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:${ENV}-latest

      - name: Output tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  update-manifest:
    name: Update Helm values & commit
    needs: [setup, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          VALUES_FILE=k8s/charts/parkgolf/values.yaml
          NEW_TAG=${{ github.sha }}

          # global.image.tag 갱신
          sed -i "s|tag: .*|tag: ${NEW_TAG}|" $VALUES_FILE
          echo "Updated $VALUES_FILE → tag: $NEW_TAG"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/charts/parkgolf/values.yaml
          if git diff --cached --quiet; then
            echo "No changes — skip commit"
          else
            git commit -m "chore(cd): bump image tag to ${{ github.sha }} [skip ci]"
            git push
          fi

  summary:
    name: Summary
    needs: [setup, update-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Print
        run: |
          echo "## Deployment dispatched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD가 자동 sync합니다 (≤5분). UI에서 진행 상태 확인:" >> $GITHUB_STEP_SUMMARY
          echo "\`kubectl -n argocd get application parkgolf\`" >> $GITHUB_STEP_SUMMARY
