<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <filter id="shadowStr" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#001a12" flood-opacity="0.35"/>
    </filter>
    <filter id="shadowMid" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="4" stdDeviation="4" flood-color="#002a1c" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#002a1c" flood-opacity="0.2"/>
    </filter>
    <clipPath id="innerCircleClip">
      <circle cx="196" cy="276" r="62"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Chat Box Base -->
  <g filter="url(#shadowStr)">
    <path d="M 165 185 L 390 185 A 32 32 0 0 1 422 217 L 422 295 A 32 32 0 0 1 390 327 L 378 327 L 378 378 L 322 327 L 165 327 Z"
          fill="#83c658" stroke="#004b36" stroke-width="26" stroke-linejoin="round"/>
  </g>

  <!-- Flag -->
  <g filter="url(#shadowLight)">
    <path d="M 148 108 L 226 130 L 148 152 Z" fill="#83c658" stroke="#83c658" stroke-width="8" stroke-linejoin="round"/>
  </g>

  <!-- Left Base & Flagpole -->
  <g filter="url(#shadowStr)">
    <circle cx="196" cy="276" r="88" fill="#004b36"/>
    <rect x="138" y="90" width="22" height="142" rx="4" fill="#004b36"/>
  </g>

  <!-- Left Inner Raised Disc -->
  <g filter="url(#shadowMid)">
    <g clip-path="url(#innerCircleClip)">
      <circle cx="196" cy="276" r="62" fill="#e9ebd4"/>
      <path d="M 130 292 Q 196 348 262 292 L 262 350 L 130 350 Z" fill="#83c658"/>
    </g>
  </g>
</svg>
