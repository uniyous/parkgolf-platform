<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkgolfMate Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap');

  :root {
    --forest: #1a5c2e;
    --forest-deep: #0d3318;
    --forest-mid: #2e8b47;
    --forest-light: #3da35d;
    --sunny: #f5c842;
    --sunny-warm: #e8b830;
    --sunny-pale: #fde68a;
    --cream: #faf7f0;
    --sand: #f0ebe0;
    --bark: #5c4a32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grass texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(26,92,46,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(245,200,66,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px 30px 80px;
  }

  /* Top badge */
  .top-badge {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.8s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .top-badge span {
    display: inline-block;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--forest);
    background: rgba(26,92,46,0.06);
    padding: 8px 24px;
    border-radius: 100px;
    border: 1px solid rgba(26,92,46,0.1);
  }

  /* Main hero logo */
  .hero-logo {
    text-align: center;
    margin-bottom: 70px;
    animation: fadeUp 1s ease 0.2s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Grid layout */
  .concepts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    margin-bottom: 60px;
  }

  .concept-card {
    background: #fff;
    border-radius: 20px;
    padding: 44px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(26,92,46,0.06);
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    animation: fadeUp 0.8s ease both;
  }

  .concept-card:nth-child(1) { animation-delay: 0.3s; }
  .concept-card:nth-child(2) { animation-delay: 0.45s; }
  .concept-card:nth-child(3) { animation-delay: 0.6s; }
  .concept-card:nth-child(4) { animation-delay: 0.75s; }

  .concept-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(26,92,46,0.1);
    border-color: rgba(26,92,46,0.12);
  }

  .concept-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--forest), var(--forest-light), var(--sunny));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .concept-card:hover::after { opacity: 1; }

  .card-tag {
    display: inline-block;
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--forest-mid);
    margin-bottom: 28px;
    opacity: 0.6;
  }

  .card-note {
    margin-top: 24px;
    font-size: 12.5px;
    color: #8a9a8a;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Full width card */
  .full-width {
    grid-column: 1 / -1;
  }

  /* Color palette section */
  .palette-section {
    margin-top: 60px;
    animation: fadeUp 0.8s ease 0.9s both;
  }

  .palette-title {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--forest);
    text-align: center;
    margin-bottom: 30px;
  }

  .palette-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .palette-chip {
    width: 260px;
    border-radius: 16px;
    padding: 36px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }

  .palette-chip:hover { transform: scale(1.03); }

  .chip-dark { background: #111e14; }
  .chip-green { background: var(--forest); }
  .chip-light { background: #fff; border: 1px solid #e4e8e4; }
  .chip-sunny { background: var(--sunny); }

  @media (max-width: 768px) {
    .concepts-grid { grid-template-columns: 1fr; }
    .page { padding: 30px 16px 60px; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ======================== HERO: Main Logo ======================== -->

        <!-- Right Eye -->

        <ellipse cx="313" cy="105.5" rx="2.8" ry="3.2" fill="#7a5800"/>

      <!-- Heart in overlap zone -->

      <!-- Shared Smile -->
      <path d="M232 124 Q260 148 288 124" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.92"/>

      <!-- Brand Name: ParkgolfMate -->

        Parkgolf<tspan fill="#f5c842">Mate</tspan>

      <!-- Tagline -->

        <path d="M348 252 C345 244, 340 248, 343 254 C346 250, 348 252, 348 252Z" fill="#2e8b47"/>

        </defs>

        <g filter="url(#scS)">
