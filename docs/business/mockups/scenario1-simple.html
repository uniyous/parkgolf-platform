<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 420px;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 420px;
    background: #161b22;
    border-radius: 20px;
    border: 1px solid #30363d;
    overflow: hidden;
    padding-bottom: 30px;
  }
  /* Header */
  .header {
    padding: 24px 24px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header .num {
    width: 40px; height: 40px; border-radius: 12px;
    background: #2ea043; display: flex; align-items: center;
    justify-content: center; font-size: 20px; font-weight: 800; color: #fff;
  }
  .header .label { font-size: 12px; color: #3fb950; font-weight: 600; letter-spacing: 1px; }
  .header .title { font-size: 20px; font-weight: 800; }

  /* Chat area */
  .chat { padding: 0 24px; }
  .user-msg {
    display: flex; justify-content: flex-end; margin-bottom: 16px;
  }
  .user-msg .bubble {
    background: #2ea043; color: #fff; padding: 12px 18px;
    border-radius: 16px 16px 4px 16px; font-size: 15px; font-weight: 500;
    max-width: 320px;
  }
  .ai-msg { margin-bottom: 16px; display: flex; gap: 8px; }
  .ai-icon {
    width: 28px; height: 28px; background: #2ea043; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .ai-bubble { flex: 1; }
  .ai-bubble .text { font-size: 14px; margin-bottom: 10px; line-height: 1.5; }

  /* Slot chips */
  .slot-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .slot-chip {
    background: #0d1117; border: 1px solid #30363d; border-radius: 10px;
    padding: 8px 12px; font-size: 13px; display: flex; align-items: center; gap: 5px;
  }
  .slot-chip.recommended {
    border-color: #2ea043; background: rgba(46, 160, 67, 0.08);
  }
  .slot-chip .time { font-weight: 700; }
  .slot-chip .seats { color: #8b949e; }
  .ai-recommend-badge {
    background: #2ea043; color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px;
  }

  /* Info mini card */
  .info-mini {
    background: #0d1117; border: 1px solid #30363d; border-radius: 12px;
    padding: 12px 14px; margin-top: 8px;
  }
  .info-mini .row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; padding: 3px 0;
  }
  .info-mini .row .icon { width: 18px; text-align: center; }
  .info-mini .row .bold { font-weight: 700; }
  .cancel-note {
    font-size: 12px; color: #8b949e; margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }

  /* Payment buttons mini */
  .pay-btns-mini { display: flex; gap: 8px; margin-top: 10px; }
  .pay-btn-mini {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  }
  .pay-btn-mini.active { background: #2ea043; color: #fff; }
  .pay-btn-mini.inactive { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

  /* Complete mini */
  .complete-mini {
    background: rgba(46, 160, 67, 0.08);
    border: 1px solid #2ea043;
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 8px;
  }
  .complete-mini .head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .complete-mini .check {
    width: 22px; height: 22px; background: #2ea043; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff;
  }
  .complete-mini .title { font-size: 14px; font-weight: 700; color: #3fb950; }
  .complete-mini .detail { font-size: 13px; color: #8b949e; margin-left: 30px; }
  .calendar-btn {
    margin-top: 8px; margin-left: 30px;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 8px;
    background: #21262d; border: 1px solid #30363d;
    font-size: 12px; color: #e6edf3; font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="num">1</div>
    <div>
      <div class="label">SCENARIO</div>
      <div class="title">간편 예약 — 한마디로 끝</div>
    </div>
  </div>

  <div class="chat">
    <!-- User message -->
    <div class="user-msg">
      <div class="bubble">내일 오전 천안 근처 2명 예약해 줘</div>
    </div>

    <!-- AI: slot results -->
    <div class="ai-msg">
      <div class="ai-icon">★</div>
      <div class="ai-bubble">
        <div class="text">천안시민 파크골프장에 내일 오전 슬롯을 찾았어요!</div>
        <div class="slot-chips">
          <div class="slot-chip">
            <span>🕐</span><span class="time">10:00</span><span class="seats">2자리</span>
          </div>
          <div class="slot-chip recommended">
            <span>🕐</span><span class="time">10:30</span><span class="seats">4자리</span>
            <span class="ai-recommend-badge">⭐추천</span>
          </div>
          <div class="slot-chip">
            <span>🕐</span><span class="time">11:00</span><span class="seats">3자리</span>
          </div>
        </div>
      </div>
    </div>

    <!-- User: select -->
    <div class="user-msg">
      <div class="bubble">10:30 선택</div>
    </div>

    <!-- AI: confirm -->
    <div class="ai-msg">
      <div class="ai-icon">★</div>
      <div class="ai-bubble">
        <div class="text">예약 정보를 확인해 주세요!</div>
        <div class="info-mini">
          <div class="row"><span class="icon">📍</span><span>천안시민 파크골프장</span></div>
          <div class="row"><span class="icon">📅</span><span>내일 10:30 · <span class="bold">2명</span> · <span class="bold">₩20,000</span></span></div>
          <div class="cancel-note">📋 취소 시 7일 전 전액환불</div>
          <div class="pay-btns-mini">
            <div class="pay-btn-mini active">현장결제</div>
            <div class="pay-btn-mini inactive">카드결제</div>
          </div>
        </div>
      </div>
    </div>

    <!-- User: pay -->
    <div class="user-msg">
      <div class="bubble">현장결제</div>
    </div>

    <!-- AI: complete -->
    <div class="ai-msg">
      <div class="ai-icon">★</div>
      <div class="ai-bubble">
        <div class="complete-mini">
          <div class="head">
            <div class="check">✓</div>
            <div class="title">예약이 완료되었습니다!</div>
          </div>
          <div class="detail">천안시민 파크골프장 · 내일 10:30 · 2명</div>
          <div class="calendar-btn">📅 캘린더 추가</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
