<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 420px;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 420px;
    background: #161b22;
    border-radius: 20px;
    border: 1px solid #30363d;
    overflow: hidden;
    padding-bottom: 30px;
  }
  .header {
    padding: 24px 24px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .header .num {
    width: 40px; height: 40px; border-radius: 12px;
    background: #8b5cf6; display: flex; align-items: center;
    justify-content: center; font-size: 20px; font-weight: 800; color: #fff;
  }
  .header .label { font-size: 12px; color: #a78bfa; font-weight: 600; letter-spacing: 1px; }
  .header .title { font-size: 20px; font-weight: 800; }

  .chat { padding: 0 24px; }

  /* Group header */
  .group-header {
    background: #0d1117; border: 1px solid #30363d; border-radius: 12px;
    padding: 10px 16px; margin-bottom: 16px;
    text-align: center; font-size: 14px; color: #8b949e;
  }
  .group-header span { color: #e6edf3; font-weight: 700; }

  /* User message with name */
  .user-name { text-align: right; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .user-msg { display: flex; justify-content: flex-end; margin-bottom: 16px; }
  .user-msg .bubble {
    background: #2ea043; color: #fff; padding: 12px 18px;
    border-radius: 16px 16px 4px 16px; font-size: 15px; font-weight: 500; max-width: 320px;
    line-height: 1.5;
  }
  .user-msg .bubble .at-ai {
    display: inline-block; background: rgba(255,255,255,0.25);
    padding: 1px 6px; border-radius: 4px; font-weight: 700; margin: 0 2px;
  }

  .ai-msg { margin-bottom: 16px; display: flex; gap: 8px; }
  .ai-icon {
    width: 28px; height: 28px; background: #2ea043; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .ai-bubble { flex: 1; }
  .ai-bubble .text { font-size: 14px; margin-bottom: 10px; line-height: 1.5; }

  /* Attendance check */
  .attendance-card {
    background: #0d1117; border: 1px solid #30363d; border-radius: 12px;
    padding: 14px; margin-bottom: 10px;
  }
  .attendance-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .member {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px;
  }
  .member .status-ok { color: #3fb950; }
  .member .status-pending { color: #e3b341; }
  .attendance-note {
    font-size: 12px; color: #8b949e;
  }

  /* Club result cards */
  .club-mini {
    background: #0d1117; border: 1px solid #30363d; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .club-mini .flag { font-size: 24px; }
  .club-mini .info { flex: 1; }
  .club-mini .name { font-size: 14px; font-weight: 700; }
  .club-mini .detail { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .seats-badge {
    background: #2ea043; color: #fff; font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 8px;
  }

  /* Member avatars */
  .members-row {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px; font-size: 12px; color: #8b949e;
  }
  .member-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
  }
  .member-avatar.red { background: #f85149; }
  .member-avatar.blue { background: #58a6ff; }
  .member-avatar.yellow { background: #e3b341; }
  .member-avatar.purple { background: #8b5cf6; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="num">3</div>
    <div>
      <div class="label">SCENARIO</div>
      <div class="title">채팅방 단체 예약</div>
    </div>
  </div>

  <div class="chat">
    <div class="group-header">👥 그룹 채팅방 · <span>4명</span></div>

    <div class="user-name">김정수</div>
    <div class="user-msg">
      <div class="bubble">다음 주 화요일 다 같이 치자!<br><span class="at-ai">@AI</span> 예약해 줘</div>
    </div>

    <!-- AI: attendance check -->
    <div class="ai-msg">
      <div class="ai-icon">★</div>
      <div class="ai-bubble">
        <div class="text">참석 확인 부탁드려요! 👇</div>
        <div class="attendance-card">
          <div class="attendance-row">
            <div class="member"><span class="status-ok">✅</span> 김정수</div>
            <div class="member"><span class="status-ok">✅</span> 이영희</div>
            <div class="member"><span class="status-pending">⏳</span> 박지현</div>
            <div class="member"><span class="status-pending">⏳</span> 최수현</div>
          </div>
          <div class="attendance-note">(2/4 확인 완료)</div>
        </div>
      </div>
    </div>

    <!-- AI: search results -->
    <div class="ai-msg">
      <div class="ai-icon">★</div>
      <div class="ai-bubble">
        <div class="text">채팅방 4명 기준으로 찾아볼게요!</div>
        <div class="club-mini">
          <div class="flag">🏌️</div>
          <div class="info">
            <div class="name">대전 유성 파크골프장</div>
            <div class="detail">🕐 화요일 09:00 · A코스</div>
          </div>
          <div class="seats-badge">4자리</div>
        </div>
        <div class="club-mini">
          <div class="flag">🏌️</div>
          <div class="info">
            <div class="name">대전 한밭 파크골프장</div>
            <div class="detail">🕐 화요일 10:00 · B코스</div>
          </div>
          <div class="seats-badge">4자리</div>
        </div>
        <div class="members-row">
          <div class="member-avatar red">김</div>
          <div class="member-avatar blue">이</div>
          <div class="member-avatar yellow">박</div>
          <div class="member-avatar purple">최</div>
          <span>4명 함께 예약 가능한 슬롯만 표시했어요</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
