<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    -webkit-font-smoothing: antialiased;
  }
  .phone-frame {
    width: 390px;
    min-height: 844px;
    background: #0d1117;
    border-radius: 40px;
    border: 3px solid #30363d;
    overflow: hidden;
    position: relative;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 8px; font-size: 15px; font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: #e6edf3; }
  .nav-bar {
    display: flex; align-items: center; padding: 8px 20px 12px;
    gap: 12px; border-bottom: 1px solid #21262d;
  }
  .nav-bar .back { font-size: 22px; color: #e6edf3; }
  .nav-bar .title { font-size: 18px; font-weight: 600; }
  .nav-bar .ai-badge {
    background: #2ea043; color: #fff; font-size: 11px;
    font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }
  .chat-area { padding: 16px; }
  .user-bubble { display: flex; justify-content: flex-end; margin-bottom: 4px; }
  .user-bubble .bubble {
    background: #2ea043; color: #fff; padding: 12px 18px;
    border-radius: 18px 18px 4px 18px; font-size: 15px; font-weight: 500; max-width: 280px;
  }
  .user-time { text-align: right; font-size: 11px; color: #8b949e; margin-bottom: 16px; }
  .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ai-avatar {
    width: 32px; height: 32px; background: #2ea043; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .ai-name { font-size: 14px; font-weight: 600; color: #3fb950; }
  .ai-content { margin-left: 8px; border-left: 3px solid #2ea043; padding-left: 12px; }
  .ai-text { font-size: 15px; color: #e6edf3; margin-bottom: 12px; line-height: 1.5; }

  /* Complete card */
  .complete-card {
    background: #161b22;
    border: 1px solid #2ea043;
    border-radius: 14px;
    padding: 20px 18px;
    margin-bottom: 12px;
  }
  .complete-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
  }
  .complete-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(46, 160, 67, 0.15); border: 2px solid #2ea043;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #2ea043;
  }
  .complete-title { font-size: 18px; font-weight: 700; color: #3fb950; }
  .complete-subtitle { font-size: 13px; color: #8b949e; margin-left: 48px; margin-bottom: 14px; }

  /* Booking number */
  .booking-num {
    background: #0d1117; border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .booking-num .label { font-size: 13px; color: #8b949e; }
  .booking-num .number { font-size: 17px; font-weight: 800; font-family: 'SF Mono', monospace; letter-spacing: 0.5px; }

  .info-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 0; font-size: 14px;
  }
  .info-row .icon { font-size: 16px; width: 22px; text-align: center; }
  .divider { border-top: 1px solid #30363d; margin: 12px 0; }

  .payment-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .payment-label { font-size: 14px; color: #8b949e; }
  .payment-amount { font-size: 22px; font-weight: 800; color: #3fb950; }
  .payment-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(46, 160, 67, 0.12); color: #3fb950;
    padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
  }

  /* Weather tip */
  .weather-tip {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed #30363d;
  }
  .weather-tip-title {
    font-size: 13px; font-weight: 600; color: #8b949e; margin-bottom: 8px;
  }
  .weather-tip-content {
    display: flex; align-items: center; gap: 10px;
    background: rgba(88, 166, 255, 0.08);
    border: 1px solid rgba(88, 166, 255, 0.2);
    border-radius: 10px; padding: 10px 14px;
  }
  .weather-tip-icon { font-size: 24px; }
  .weather-tip-info .conditions { font-size: 13px; color: #58a6ff; font-weight: 600; }
  .weather-tip-info .advice { font-size: 12px; color: #8b949e; margin-top: 2px; }

  /* Quick actions */
  .quick-actions {
    display: flex; gap: 10px; margin-top: 14px;
  }
  .quick-btn {
    flex: 1; padding: 10px; border-radius: 10px;
    background: #21262d; border: 1px solid #30363d;
    text-align: center; font-size: 13px; font-weight: 600; color: #e6edf3;
    cursor: pointer;
  }

  /* Time badge */
  .time-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 20px; padding: 8px 20px;
    background: #161b22; border: 1px solid #30363d;
    border-radius: 20px; font-size: 13px; color: #8b949e;
    width: fit-content; margin-left: auto; margin-right: auto;
  }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px 28px; display: flex; align-items: center; gap: 10px;
    background: #0d1117; border-top: 1px solid #21262d;
  }
  .bottom-bar .star-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #161b22; border: 1px solid #30363d;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #2ea043;
  }
  .bottom-bar .input {
    flex: 1; background: #161b22; border: 1px solid #30363d;
    border-radius: 20px; padding: 10px 16px; color: #8b949e; font-size: 14px;
  }
  .bottom-bar .send-btn {
    width: 40px; height: 40px; border-radius: 50%; background: #2ea043;
    border: none; display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>9:42</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M2 22h20V2L2 22z"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <span class="back">←</span>
    <span class="title">AI 예약 도우미</span>
    <span class="ai-badge">AI</span>
  </div>

  <div class="chat-area">
    <div class="user-bubble">
      <div class="bubble">천안 골프장 2명 예약해 줘</div>
    </div>
    <div class="user-time">오전 9:41</div>

    <div class="ai-header">
      <div class="ai-avatar">★</div>
      <span class="ai-name">AI 예약 도우미</span>
    </div>
    <div class="ai-content">
      <div class="ai-text">예약이 완료되었습니다! 즐거운 라운드 되세요! 🎉</div>

      <div class="complete-card">
        <div class="complete-header">
          <div class="complete-icon">✓</div>
          <span class="complete-title">예약 완료</span>
        </div>
        <div class="complete-subtitle">예약이 확정되었습니다</div>

        <div class="booking-num">
          <span class="label">예약번호</span>
          <span class="number">BK-20260225-0042</span>
        </div>

        <div class="info-row">
          <span class="icon">📍</span>
          <span>천안시민 파크골프장</span>
        </div>
        <div class="info-row">
          <span class="icon">📅</span>
          <span>2026년 2월 25일 (화) 10:30</span>
        </div>
        <div class="info-row">
          <span class="icon">👥</span>
          <span>2명 (A코스)</span>
        </div>

        <div class="divider"></div>

        <div class="payment-row">
          <span class="payment-label">결제 금액</span>
          <span class="payment-amount">₩20,000</span>
        </div>
        <div class="payment-badge">🟢 현장결제 예정</div>

        <!-- Weather tip -->
        <div class="weather-tip">
          <div class="weather-tip-title">☀️ 오늘의 골프 팁</div>
          <div class="weather-tip-content">
            <div class="weather-tip-icon">☀️</div>
            <div class="weather-tip-info">
              <div class="conditions">맑음 18°C · UV 보통</div>
              <div class="advice">"선크림과 모자를 챙기세요!"</div>
            </div>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="quick-actions">
          <div class="quick-btn">📅 캘린더 추가</div>
          <div class="quick-btn">📤 공유하기</div>
        </div>
      </div>
    </div>

    <div class="time-badge">⏱ 소요시간: 약 15초</div>
  </div>

  <div class="bottom-bar">
    <div class="star-btn">☆</div>
    <div class="input">메시지를 입력하세요....</div>
    <div class="send-btn">➤</div>
  </div>
</div>
</body>
</html>
