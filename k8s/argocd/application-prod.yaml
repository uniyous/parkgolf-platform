apiVersion: v1
kind: Namespace
metadata:
  name: parkgolf-prod
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parkgolf-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/uniyous/parkgolf-platform.git
    targetRevision: main
    path: k8s/charts/parkgolf
    helm:
      releaseName: parkgolf
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: parkgolf-prod
  syncPolicy:
    # prod: 자동 sync 끄고 수동 승인 권장 (안전)
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
