apiVersion: v1
kind: Namespace
metadata:
  name: parkgolf-prod
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parkgolf-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/uniyous/parkgolf-platform.git
    targetRevision: main
    path: k8s/charts/parkgolf
    helm:
      releaseName: parkgolf
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: parkgolf-prod
  # controller가 자동 추가하는 default field 무시 (cosmetic drift 차단)
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.target.template.engineVersion
        - .spec.target.template.mergePolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
    - group: external-secrets.io
      kind: ClusterSecretStore
      jqPathExpressions:
        - .spec.conditions
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.persistentVolumeClaimRetentionPolicy
        - .spec.podManagementPolicy
        - .spec.revisionHistoryLimit
        - .spec.updateStrategy
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
  syncPolicy:
    # prod: 자동 sync 끄고 수동 승인 권장 (안전)
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
