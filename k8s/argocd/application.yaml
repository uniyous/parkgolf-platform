apiVersion: v1
kind: Namespace
metadata:
  name: parkgolf-dev
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parkgolf
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/uniyous/parkgolf-platform.git
    targetRevision: develop
    path: k8s/charts/parkgolf
    helm:
      releaseName: parkgolf
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: parkgolf-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
