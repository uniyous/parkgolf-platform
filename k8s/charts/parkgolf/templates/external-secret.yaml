{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcpProjectId }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.clusterLocation }}
          clusterName: {{ .Values.externalSecrets.clusterName }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# parkgolf-secrets — 모든 키를 한 번에 동기화
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: parkgolf-secrets
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: parkgolf-secrets
    creationPolicy: Owner
  data:
{{- range .Values.externalSecrets.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: parkgolf-dev-{{ . }}
{{- end }}
---
# 서비스별 DATABASE_URL — POSTGRES_USER/PASSWORD 합성
{{- range .Values.services }}
{{- if .db }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}-db
  namespace: {{ $.Values.global.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .name }}-db-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql://{{ "{{ .user }}" }}:{{ "{{ .password }}" }}@postgres:5432/{{ .db }}"
  data:
    - secretKey: user
      remoteRef: { key: parkgolf-dev-POSTGRES_USER }
    - secretKey: password
      remoteRef: { key: parkgolf-dev-POSTGRES_PASSWORD }
---
{{- end }}
{{- end }}
{{- end }}
